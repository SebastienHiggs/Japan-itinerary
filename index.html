<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan & KL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f1eb;
  --bg-card: #fffcf8;
  --bg-card-hover: #fff9f0;
  --text: #2c2520;
  --text-muted: #8a7e74;
  --text-light: #b5a99a;
  --accent: #c8553d;
  --accent-soft: #e8a090;
  --border: #e6ddd3;
  --border-light: #efe8df;
  --tag-flight: #dce8f0;
  --tag-flight-text: #3a6b8a;
  --tag-hotel: #e5e0d5;
  --tag-hotel-text: #6b5e4f;
  --tag-train: #d8e6d3;
  --tag-train-text: #4a6b42;
  --tag-daytrip: #f0e4d6;
  --tag-daytrip-text: #9a6d3a;
  --shadow-sm: 0 1px 3px rgba(44,37,32,0.06);
  --shadow-md: 0 4px 16px rgba(44,37,32,0.08);
  --shadow-lg: 0 8px 32px rgba(44,37,32,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* === LOCK SCREEN === */
.lock-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.lock-screen.unlocked {
  opacity: 0;
  transform: scale(1.02);
  pointer-events: none;
}
.lock-inner {
  text-align: center;
  padding: 2rem;
  max-width: 360px;
  width: 100%;
}
.lock-kanji {
  font-family: 'Noto Serif JP', serif;
  font-size: 4rem;
  font-weight: 300;
  color: var(--accent);
  margin-bottom: 0.5rem;
  letter-spacing: 0.1em;
}
.lock-subtitle {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 2.5rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.lock-input-wrap {
  position: relative;
  margin-bottom: 1rem;
}
.lock-input {
  width: 100%;
  padding: 14px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  letter-spacing: 0.2em;
  text-align: center;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.lock-input:focus {
  border-color: var(--accent-soft);
  box-shadow: 0 0 0 3px rgba(200,85,61,0.1);
}
.lock-input.shake {
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-8px); }
  40%,80% { transform: translateX(8px); }
}
.lock-hint {
  font-size: 0.78rem;
  color: var(--text-light);
  opacity: 0;
  transition: opacity 0.3s;
}
.lock-hint.visible { opacity: 1; }

/* === MAIN APP === */
.app {
  display: none;
  opacity: 0;
  transition: opacity 0.6s ease 0.3s;
}
.app.visible {
  display: block;
  opacity: 1;
}

/* === HEADER === */
.header {
  padding: 2.5rem 1.5rem 1.5rem;
  max-width: 960px;
  margin: 0 auto;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  margin-bottom: 0.25rem;
}
.header h1 {
  font-family: 'Noto Serif JP', serif;
  font-weight: 500;
  font-size: 1.8rem;
  letter-spacing: -0.01em;
  color: var(--text);
}
.header-dates {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-weight: 400;
}
.header-bar {
  margin-top: 1rem;
  display: flex;
  gap: 0;
  border-bottom: 1.5px solid var(--border);
}
.tab {
  padding: 0.6rem 1.2rem;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1.5px;
  transition: color 0.2s, border-color 0.2s;
  user-select: none;
  letter-spacing: 0.03em;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab:hover:not(.active) { color: var(--text); }
.tab.disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* === PROGRESS BAR === */
.progress-section {
  max-width: 960px;
  margin: 1.25rem auto 0;
  padding: 0 1.5rem;
}
.progress-bar-wrap {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.progress-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.6s ease;
  width: 0%;
}
.progress-label {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}

/* === STAY CARDS (shared by detail panel + mobile day view) === */
.stay {
  border-radius: var(--radius);
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow 0.3s;
}
.stay:hover { box-shadow: var(--shadow-md); }

.stay-header {
  display: flex;
  align-items: center;
  padding: 1rem 1.25rem;
  cursor: pointer;
  user-select: none;
  gap: 0.85rem;
  transition: background 0.2s;
}
.stay-header:hover { background: var(--bg-card-hover); }

.stay-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.stay-icon.flight { background: var(--tag-flight); }
.stay-icon.hotel { background: var(--tag-hotel); }
.stay-icon.train { background: var(--tag-train); }
.stay-icon.daytrip { background: var(--tag-daytrip); }

.stay-info { flex: 1; min-width: 0; }
.stay-title {
  font-weight: 600;
  font-size: 0.92rem;
  color: var(--text);
  margin-bottom: 0.15rem;
}
.stay-subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stay-nights {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--text-light);
  background: var(--border-light);
  padding: 3px 8px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.stay-chevron {
  width: 20px; height: 20px;
  color: var(--text-light);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.stay.open .stay-chevron { transform: rotate(180deg); }

.stay-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.stay-body-inner {
  padding: 0 1.25rem 1.25rem;
}

.event-list { list-style: none; }
.event-item {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.65rem 0;
  border-top: 1px solid var(--border-light);
  font-size: 0.83rem;
}
.event-item:first-child { border-top: none; }

.event-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  min-width: 56px;
  padding-top: 1px;
  flex-shrink: 0;
}
.event-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.event-dot.flight { background: var(--tag-flight-text); }
.event-dot.hotel { background: var(--tag-hotel-text); }
.event-dot.train { background: var(--tag-train-text); }
.event-dot.daytrip { background: var(--tag-daytrip-text); }

.event-detail { flex: 1; }
.event-label {
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.1rem;
}
.event-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* === ADMIN MODE === */
.admin-badge {
  display: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #b48811;
  background: #fdf3d7;
  border: 1px solid #f0d87a;
  padding: 3px 10px;
  border-radius: 6px;
  margin-left: auto;
}
body.admin-mode .admin-badge { display: inline-block; }

.admin-only { display: none; }
body.admin-mode .admin-only { display: flex; }

.admin-only-block { display: none; }
body.admin-mode .admin-only-block { display: block; }

body.admin-mode .header-bar { border-bottom-color: #f0d87a; }

.admin-note {
  display: none;
  margin-top: 0.75rem;
  padding: 0.65rem 0.85rem;
  background: #fefcf3;
  border: 1px dashed #e8d48a;
  border-radius: var(--radius-sm);
  font-size: 0.78rem;
  color: #8a7430;
}
body.admin-mode .admin-note { display: block; }

.admin-note-title {
  font-weight: 600;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #b48811;
  margin-bottom: 0.3rem;
}

/* === CALENDAR VIEW (Desktop) === */
.cal-view {
  max-width: 960px;
  margin: 1.5rem auto 4rem;
  padding: 0 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.cal-week-group {
  border-radius: var(--radius);
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.cal-day-headers {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border-light);
}

.cal-day-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.55rem 0.25rem 0.4rem;
  gap: 0.18rem;
  border-right: 1px solid var(--border-light);
}
.cal-day-header:last-child { border-right: none; }

.cal-day-name {
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-light);
}

.cal-day-num {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-muted);
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  line-height: 1;
}

.cal-day-header.is-today .cal-day-name { color: var(--accent); }
.cal-day-header.is-today .cal-day-num {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}
.cal-day-header.outside-trip { opacity: 0.3; }

/* Bars area */
.cal-bars-area {
  position: relative;
}

.cal-grid-lines {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  pointer-events: none;
  z-index: 0;
}
.cal-grid-cell {
  border-right: 1px solid var(--border-light);
}
.cal-grid-cell:last-child { border-right: none; }
.cal-grid-cell.is-today { background: rgba(200,85,61,0.04); }
.cal-grid-cell.outside-trip { background: rgba(0,0,0,0.018); }

/* Bars */
.cal-bar {
  position: absolute;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 8px;
  border-radius: 6px;
  cursor: pointer;
  overflow: hidden;
  white-space: nowrap;
  transition: filter 0.15s;
  font-size: 0.72rem;
  font-weight: 500;
}
.cal-bar:hover { filter: brightness(0.91); }
.cal-bar.active {
  filter: brightness(0.87);
  outline: 2px solid rgba(0,0,0,0.2);
  outline-offset: -1px;
}

.cal-bar.flight  { background: var(--tag-flight);  color: var(--tag-flight-text); }
.cal-bar.hotel   { background: var(--tag-hotel);   color: var(--tag-hotel-text); }
.cal-bar.train   { background: var(--tag-train);   color: var(--tag-train-text); }
.cal-bar.daytrip { background: var(--tag-daytrip); color: var(--tag-daytrip-text); }

.cal-bar.continues-before { border-top-left-radius: 0; border-bottom-left-radius: 0; }
.cal-bar.continues-after  { border-top-right-radius: 0; border-bottom-right-radius: 0; }

.cal-bar-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

/* Detail panel */
.cal-detail-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.cal-detail-panel.open {
  border-top: 1px solid var(--border-light);
}

.cal-detail-inner {
  padding: 1rem 1.25rem 1.25rem;
}

.cal-detail-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.85rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border-light);
}

/* === MOBILE DAY VIEW === */
.day-view {
  max-width: 800px;
  margin: 1.5rem auto 4rem;
  padding: 0 1rem;
  display: none;
}

.day-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 0.85rem 1rem;
  box-shadow: var(--shadow-sm);
}

.day-nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.day-nav-btn:hover:not(:disabled) {
  background: var(--border-light);
  color: var(--text);
  border-color: var(--text-muted);
}
.day-nav-btn:disabled { opacity: 0.25; cursor: default; }
.day-nav-btn svg { width: 16px; height: 16px; }

.day-nav-center { text-align: center; }
.day-nav-name {
  display: block;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 0.15rem;
}
.day-nav-date {
  display: block;
  font-family: 'Noto Serif JP', serif;
  font-size: 1.3rem;
  font-weight: 500;
  color: var(--text);
}

.day-stays { display: flex; flex-direction: column; gap: 0.75rem; }

.day-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* === RESPONSIVE === */
@media (max-width: 640px) {
  .cal-view { display: none; }
  .day-view { display: block; }
  .header { padding: 2rem 1rem 1rem; max-width: 100%; }
  .header h1 { font-size: 1.45rem; }
  .header-top { flex-direction: column; gap: 0.2rem; }
  .progress-section { padding: 0 1rem; max-width: 100%; }
  .stay-header { padding: 0.85rem 1rem; gap: 0.65rem; }
  .stay-body-inner { padding: 0 1rem 1rem; }
  .stay-icon { width: 32px; height: 32px; font-size: 1rem; }
  .stay-title { font-size: 0.85rem; }
  .event-time { min-width: 48px; font-size: 0.7rem; }
  .tab { padding: 0.5rem 0.8rem; font-size: 0.78rem; }
}

/* === ANIMATIONS === */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.cal-week-group {
  animation: fadeInUp 0.35s ease both;
}
.cal-week-group:nth-child(1) { animation-delay: 0.05s; }
.cal-week-group:nth-child(2) { animation-delay: 0.1s; }
.cal-week-group:nth-child(3) { animation-delay: 0.15s; }
.cal-week-group:nth-child(4) { animation-delay: 0.2s; }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-inner">
    <div class="lock-kanji">旅</div>
    <div class="lock-subtitle">Enter password to continue</div>
    <div class="lock-input-wrap">
      <input type="password" class="lock-input" id="lockInput" placeholder="・・・・・" autocomplete="off" autofocus>
    </div>
    <div class="lock-hint" id="lockHint">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <h1>Japan & KL 2026</h1>
      <span class="header-dates">23 Apr — 10 May</span>
      <span class="admin-badge" id="adminBadge">Admin</span>
    </div>
    <div class="header-bar">
      <div class="tab active">Itinerary</div>
      <div class="tab disabled">Budget</div>
      <div class="tab disabled">Packing</div>
      <div class="tab disabled">Notes</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">—</span>
    </div>
  </div>

  <!-- Desktop calendar -->
  <div class="cal-view" id="calView"></div>

  <!-- Mobile day view -->
  <div class="day-view" id="dayView"></div>
</div>

<script>
// PASSWORD & ADMIN MODE
const HASH_BASIC = 'a93f7a91f88ee389a5147b54b22968c2521a59e41b1bf98ff0d22d7b5a704a42';
const HASH_ADMIN = '18e10022c5340c5f1a95c2cd7f866409bf1cf6b0fab6e3e7265240128503dd96';
let isAdmin = false;

const lockScreen = document.getElementById('lockScreen');
const lockInput  = document.getElementById('lockInput');
const lockHint   = document.getElementById('lockHint');
const app        = document.getElementById('app');

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function unlock(admin) {
  isAdmin = admin;
  sessionStorage.setItem('trip_unlocked', '1');
  sessionStorage.setItem('trip_admin', admin ? '1' : '0');
  if (admin) document.body.classList.add('admin-mode');
  lockScreen.classList.add('unlocked');
  setTimeout(() => {
    lockScreen.style.display = 'none';
    app.style.display = 'block';
    requestAnimationFrame(() => {
      app.classList.add('visible');
      renderCalendar();
      renderDayView();
    });
  }, 500);
}

// Session restore
if (sessionStorage.getItem('trip_unlocked') === '1') {
  isAdmin = sessionStorage.getItem('trip_admin') === '1';
  if (isAdmin) document.body.classList.add('admin-mode');
  lockScreen.style.display = 'none';
  app.classList.add('visible');
  app.style.display = 'block';
  app.style.opacity = '1';
}

lockInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const hash = await sha256(lockInput.value.trim().toLowerCase());
    if (hash === HASH_ADMIN) {
      unlock(true);
    } else if (hash === HASH_BASIC) {
      unlock(false);
    } else {
      lockInput.classList.add('shake');
      lockHint.classList.add('visible');
      setTimeout(() => lockInput.classList.remove('shake'), 400);
      setTimeout(() => lockHint.classList.remove('visible'), 2000);
    }
  }
});

// DATA
const tripStart = new Date('2026-04-23');
const tripEnd   = new Date('2026-05-10');
tripStart.setHours(0,0,0,0);
tripEnd.setHours(0,0,0,0);

const stays = [
  {
    id: 'syd-osaka',
    icon: '✈️', type: 'flight',
    title: 'Sydney → Osaka (Kansai)',
    subtitle: '23 Apr · Flight',
    nights: null,
    dates: ['2026-04-23', '2026-04-23'],
    events: [
      { time: '11:00am', label: 'Depart Sydney',  meta: 'Kansai International',  dot: 'flight' },
      { time: '7:50pm',  label: 'Arrive Osaka',   meta: 'Same day (local time)', dot: 'flight' },
    ],
    adminNotes: 'Booking ref & seat assignments go here. Add any lounge access details.'
  },
  {
    id: 'osaka',
    icon: '🏯', type: 'hotel',
    title: 'Osaka · Namba Dotonbori',
    subtitle: 'The OneFive Osaka Namba Dotonbori',
    nights: '2 nights',
    dates: ['2026-04-23', '2026-04-25'],
    events: [
      { time: '23 Apr', label: 'Check in',  meta: 'The OneFive Osaka Namba Dotonbori · from 3:00pm', dot: 'hotel' },
      { time: '25 Apr', label: 'Check out', meta: 'By 10:00am', dot: 'hotel' },
    ],
    adminNotes: 'Confirmation number, room type, cost per night, and any special requests.'
  },
  {
    id: 'osaka-okayama',
    icon: '🚅', type: 'train',
    title: 'Osaka → Okayama',
    subtitle: '25 Apr · Shinkansen · 45 min',
    nights: null,
    dates: ['2026-04-25', '2026-04-25'],
    events: [
      { time: '25 Apr', label: 'Shinkansen to Okayama', meta: '~45 minutes', dot: 'train' },
    ],
    adminNotes: 'JR Pass details, reserved seat numbers, departure platform.'
  },

// =====================
// CALENDAR VIEW (Desktop)
// =====================
const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const BAR_H   = 28;
const BAR_GAP = 4;
const BAR_PAD = 8; // top/bottom padding inside bars area

function buildWeeks() {
  // Start from the Sunday on or before tripStart
  const start = new Date(tripStart);
  start.setDate(start.getDate() - start.getDay());

  const weeks = [];
  let cur = new Date(start);
  while (cur <= tripEnd) {
    const days = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(cur);
      d.setDate(d.getDate() + i);
      return d;
    });
    weeks.push({ start: new Date(cur), end: days[6], days });
    cur.setDate(cur.getDate() + 7);
  }
  return weeks;
}

function getBarsForWeek(week) {
  const bars = [];
  stays.forEach(stay => {
    const s = new Date(stay.dates[0]); s.setHours(0,0,0,0);
    const e = new Date(stay.dates[1]); e.setHours(0,0,0,0);
    if (e < week.start || s > week.end) return;

    const clampedStart = s < week.start ? week.start : s;
    const clampedEnd   = e > week.end   ? week.end   : e;

    bars.push({
      stay,
      colStart: clampedStart.getDay(),
      colEnd:   clampedEnd.getDay(),
      continuesBefore: s < week.start,
      continuesAfter:  e > week.end,
    });
  });

  // Sort by start col, then put multi-day before single-day for better packing
  bars.sort((a, b) =>
    a.colStart - b.colStart ||
    (b.colEnd - b.colStart) - (a.colEnd - a.colStart)
  );

  // Greedy row assignment
  const slots = []; // slots[rowIdx] = last occupied colEnd
  bars.forEach(bar => {
    let row = slots.findIndex(endCol => endCol < bar.colStart);
    if (row === -1) { row = slots.length; slots.push(-1); }
    slots[row] = bar.colEnd;
    bar.row = row;
  });

  return { bars, rowCount: Math.max(1, slots.length) };
}

let openCalDetail = null; // { weekEl, stayId }

function toggleCalDetail(stayId, weekEl) {
  const panel = weekEl.querySelector('.cal-detail-panel');
  const isSame = openCalDetail &&
    openCalDetail.weekEl === weekEl &&
    openCalDetail.stayId === stayId;

  // Close whatever is open
  if (openCalDetail) {
    const prev = openCalDetail.weekEl.querySelector('.cal-detail-panel');
    prev.style.maxHeight = prev.scrollHeight + 'px';
    requestAnimationFrame(() => {
      prev.style.maxHeight = '0';
      prev.classList.remove('open');
    });
    openCalDetail.weekEl.querySelectorAll('.cal-bar')
      .forEach(b => b.classList.remove('active'));
    openCalDetail = null;
  }

  if (isSame) return;

  const stay = stays.find(s => s.id === stayId);
  if (!stay) return;

  const adminNoteHTML = stay.adminNotes
    ? `<div class="admin-note"><div class="admin-note-title">Admin Notes</div>${stay.adminNotes}</div>`
    : '';

  panel.innerHTML = `
    <div class="cal-detail-inner">
      <div class="cal-detail-header">
        <div class="stay-icon ${stay.type}">${stay.icon}</div>
        <div class="stay-info">
          <div class="stay-title">${stay.title}</div>
          <div class="stay-subtitle">${stay.subtitle}</div>
        </div>
        ${stay.nights ? `<span class="stay-nights">${stay.nights}</span>` : ''}
      </div>
      <ul class="event-list">
        ${stay.events.map(ev => `
          <li class="event-item${ev.adminOnly ? ' admin-only' : ''}">
            <span class="event-time">${ev.time}</span>
            <span class="event-dot ${ev.dot}"></span>
            <div class="event-detail">
              <div class="event-label">${ev.label}</div>
              ${ev.meta ? `<div class="event-meta">${ev.meta}</div>` : ''}
            </div>
          </li>
        `).join('')}
      </ul>
      ${adminNoteHTML}
    </div>`;

  panel.classList.add('open');
  panel.style.maxHeight = '0';
  requestAnimationFrame(() => {
    panel.style.maxHeight = panel.scrollHeight + 'px';
    panel.addEventListener('transitionend', function h() {
      if (panel.classList.contains('open')) panel.style.maxHeight = 'none';
      panel.removeEventListener('transitionend', h);
    });
  });

  const activeBar = weekEl.querySelector(`.cal-bar[data-stay-id="${stayId}"]`);
  if (activeBar) activeBar.classList.add('active');
  openCalDetail = { weekEl, stayId };
}

function renderCalendar() {
  const calView = document.getElementById('calView');
  if (calView.children.length > 0) return;

  const today = new Date(); today.setHours(0,0,0,0);
  const weeks = buildWeeks();

  weeks.forEach(week => {
    const { bars, rowCount } = getBarsForWeek(week);
    const barsH = BAR_PAD * 2 + rowCount * BAR_H + (rowCount - 1) * BAR_GAP;

    const weekEl = document.createElement('div');
    weekEl.className = 'cal-week-group';

    // Day headers row
    const hdrsEl = document.createElement('div');
    hdrsEl.className = 'cal-day-headers';
    week.days.forEach(day => {
      const isToday  = day.getTime() === today.getTime();
      const inTrip   = day >= tripStart && day <= tripEnd;
      const hEl = document.createElement('div');
      hEl.className = 'cal-day-header'
        + (isToday ? ' is-today' : '')
        + (!inTrip ? ' outside-trip' : '');
      hEl.innerHTML =
        `<span class="cal-day-name">${DAY_NAMES[day.getDay()]}</span>` +
        `<span class="cal-day-num">${day.getDate()}</span>`;
      hdrsEl.appendChild(hEl);
    });
    weekEl.appendChild(hdrsEl);

    // Bars area
    const barsEl = document.createElement('div');
    barsEl.className = 'cal-bars-area';
    barsEl.style.height = barsH + 'px';

    // Background grid lines
    const gridEl = document.createElement('div');
    gridEl.className = 'cal-grid-lines';
    week.days.forEach(day => {
      const cell = document.createElement('div');
      cell.className = 'cal-grid-cell'
        + (day.getTime() === today.getTime() ? ' is-today' : '')
        + (day < tripStart || day > tripEnd ? ' outside-trip' : '');
      gridEl.appendChild(cell);
    });
    barsEl.appendChild(gridEl);

    // Event bars
    bars.forEach(bar => {
      const leftInset  = bar.continuesBefore ? 0 : 2;
      const rightInset = bar.continuesAfter  ? 0 : 2;

      const barEl = document.createElement('div');
      barEl.className = `cal-bar ${bar.stay.type}`
        + (bar.continuesBefore ? ' continues-before' : '')
        + (bar.continuesAfter  ? ' continues-after'  : '');
      barEl.dataset.stayId = bar.stay.id;
      barEl.style.cssText = [
        `left:   calc(${bar.colStart} / 7 * 100% + ${leftInset}px)`,
        `width:  calc(${bar.colEnd - bar.colStart + 1} / 7 * 100% - ${leftInset + rightInset}px)`,
        `top:    ${BAR_PAD + bar.row * (BAR_H + BAR_GAP)}px`,
        `height: ${BAR_H}px`,
      ].join(';');
      barEl.innerHTML =
        `<span>${bar.stay.icon}</span>` +
        `<span class="cal-bar-label">${bar.stay.title}</span>`;
      barEl.addEventListener('click', () => toggleCalDetail(bar.stay.id, weekEl));
      barsEl.appendChild(barEl);
    });

    weekEl.appendChild(barsEl);

    // Detail panel (closed by default)
    const detailEl = document.createElement('div');
    detailEl.className = 'cal-detail-panel';
    detailEl.style.maxHeight = '0';
    weekEl.appendChild(detailEl);

    calView.appendChild(weekEl);
  });

  updateProgress();
}

// =====================
// MOBILE DAY VIEW
// =====================
let currentDay = null;

function renderDayView() {
  const dayView = document.getElementById('dayView');
  const today = new Date(); today.setHours(0,0,0,0);

  if (!currentDay) {
    currentDay = (today >= tripStart && today <= tripEnd)
      ? new Date(today)
      : new Date(tripStart);
  }

  const date = currentDay;
  const prev = new Date(date); prev.setDate(prev.getDate() - 1);
  const next = new Date(date); next.setDate(next.getDate() + 1);
  const canPrev = prev >= tripStart;
  const canNext = next <= tripEnd;

  const dayStays = stays.filter(stay => {
    const s = new Date(stay.dates[0]); s.setHours(0,0,0,0);
    const e = new Date(stay.dates[1]); e.setHours(0,0,0,0);
    return date >= s && date <= e;
  });

  const staysHTML = dayStays.length === 0
    ? '<div class="day-empty">No events this day</div>'
    : dayStays.map(stay => {
        const adminNoteHTML = stay.adminNotes
          ? `<div class="admin-note"><div class="admin-note-title">Admin Notes</div>${stay.adminNotes}</div>`
          : '';
        return `
          <div class="stay open">
            <div class="stay-header" onclick="toggleStay(this)">
              <div class="stay-icon ${stay.type}">${stay.icon}</div>
              <div class="stay-info">
                <div class="stay-title">${stay.title}</div>
                <div class="stay-subtitle">${stay.subtitle}</div>
              </div>
              ${stay.nights ? `<span class="stay-nights">${stay.nights}</span>` : ''}
              <svg class="stay-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="stay-body" style="max-height:none">
              <div class="stay-body-inner">
                <ul class="event-list">
                  ${stay.events.map(ev => `
                    <li class="event-item${ev.adminOnly ? ' admin-only' : ''}">
                      <span class="event-time">${ev.time}</span>
                      <span class="event-dot ${ev.dot}"></span>
                      <div class="event-detail">
                        <div class="event-label">${ev.label}</div>
                        ${ev.meta ? `<div class="event-meta">${ev.meta}</div>` : ''}
                      </div>
                    </li>
                  `).join('')}
                </ul>
                ${adminNoteHTML}
              </div>
            </div>
          </div>`;
      }).join('');

  dayView.innerHTML = `
    <div class="day-nav">
      <button class="day-nav-btn" onclick="navigateDay(-1)" ${!canPrev ? 'disabled' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-nav-center">
        <span class="day-nav-name">${DAY_NAMES[date.getDay()]}</span>
        <span class="day-nav-date">${date.getDate()} ${MONTH_SHORT[date.getMonth()]}</span>
      </div>
      <button class="day-nav-btn" onclick="navigateDay(1)" ${!canNext ? 'disabled' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="day-stays">${staysHTML}</div>`;

  updateProgress();
}

function navigateDay(dir) {
  const next = new Date(currentDay);
  next.setDate(next.getDate() + dir);
  if (next >= tripStart && next <= tripEnd) {
    currentDay = next;
    renderDayView();
  }
}

// TOGGLE (used by mobile day view cards)
function toggleStay(header) {
  const stay = header.parentElement;
  const body = stay.querySelector('.stay-body');
  const isOpen = stay.classList.contains('open');
  if (isOpen) {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => { body.style.maxHeight = '0'; });
    stay.classList.remove('open');
  } else {
    stay.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
    body.addEventListener('transitionend', function handler() {
      if (stay.classList.contains('open')) body.style.maxHeight = 'none';
      body.removeEventListener('transitionend', handler);
    });
  }
}

// PROGRESS
function updateProgress() {
  const now = new Date();
  const total   = tripEnd - tripStart;
  const elapsed = now - tripStart;
  const pct = Math.max(0, Math.min(100, (elapsed / total) * 100));
  const fill  = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');

  if (now < tripStart) {
    const days = Math.ceil((tripStart - now) / 86400000);
    fill.style.width = '0%';
    label.textContent = `${days}d until departure`;
  } else if (now > tripEnd) {
    fill.style.width = '100%';
    label.textContent = 'Trip complete ✓';
  } else {
    fill.style.width = pct.toFixed(1) + '%';
    const daysLeft = Math.ceil((tripEnd - now) / 86400000);
    label.textContent = `Day ${Math.ceil(elapsed / 86400000)} · ${daysLeft}d left`;
  }
}

// Render on load if already unlocked via session
if (sessionStorage.getItem('trip_unlocked') === '1') {
  renderCalendar();
  renderDayView();
}
